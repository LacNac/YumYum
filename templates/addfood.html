<!-- templates/food_add.html -->
{% extends 'basemanager.html' %}

{% block title %}Thêm món{% endblock %}

{% block content %}

<style>
.container {
    max-width: 500px;
    margin: 40px auto;
    background: #1c1919;
    padding: 25px 30px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    font-family: Arial, sans-serif;
}

.container h2 {
    text-align: center;
    margin-bottom: 20px;
}

.form-group {
    margin-bottom: 15px;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 5px;
}

input {
    width: 100%;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    outline: none;
    transition: 0.2s;
}

input:focus {
    border-color: #007bff;
}

button {
    width: 100%;
    padding: 12px;
    background: #007bff;
    border: none;
    color: black;
    font-weight: bold;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #0056b3;
}
</style>

<div class="container">
    <h2>Thêm món ăn</h2>

    <form method="POST">
        <div class="form-group">
            <label>Tên món</label>
            <input type="text" name="ten" required>
        </div>

        <div class="form-group">
            <label>Giá</label>
            <input type="number" name="gia" required>
        </div>

        <div class="form-group">
            <label>Danh mục</label>
            <input type="text" name="danhmuc">
        </div>

        <div class="form-group">
            <label>Ảnh (URL hoặc tên file)</label>
            <input type="text" name="anh">
        </div>

        <button type="submit">Thêm món</button>
    </form>
</div>
{% endblock %}
