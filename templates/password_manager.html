{% extends "base.html" %}
{% block content %}
<style>
    /* Vùng bao quanh toàn bộ trang quản lý */
    .yy-account-wrapper {
        display: flex;
        max-width: 1050px;
        margin: 40px auto;
        padding: 0 20px;
        gap: 40px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Khối menu điều hướng bên cạnh */
    .yy-nav-panel {
        flex: 0 0 260px;
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        height: max-content;
        padding: 10px 0;
    }

    .yy-nav-link {
        display: block;
        padding: 16px 25px;
        text-decoration: none;
        color: #4a4a4a;
        font-weight: 500;
        transition: all 0.2s ease;
    }

    .yy-nav-link:hover {
        background-color: #fffcf2;
        color: #000;
        padding-left: 30px;
    }

    .yy-nav-link.yy-active {
        background-color: #f8d05d; /* Màu vàng Yummy */
        color: #000;
        font-weight: 700;
    }

    /* Khối nội dung chính bên phải */
    .yy-main-editor {
        flex: 1;
        background: #ffffff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .yy-section-title {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 30px;
        color: #222;
        position: relative;
    }

    .yy-section-title::after {
        content: '';
        display: block;
        width: 50px;
        height: 4px;
        background: #f8d05d;
        margin-top: 8px;
    }

    /* Các thành phần trong form */
    .yy-input-group {
        margin-bottom: 25px;
    }

    .yy-label-text {
        display: block;
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #888;
        margin-bottom: 10px;
        font-weight: 600;
    }

    .yy-form-field {
        width: 100%;
        padding: 14px 18px;
        border: 2px solid #f0f0f0;
        border-radius: 12px;
        font-size: 16px;
        outline: none;
        transition: border-color 0.3s ease;
        box-sizing: border-box;
    }

    .yy-form-field:focus {
        border-color: #f8d05d;
    }

    /* Nút bấm */
    .yy-btn-submit {
        background: #222; /* Đổi sang màu đen cho sang trọng */
        color: #f8d05d; /* Chữ vàng */
        border: none;
        padding: 18px;
        width: 100%;
        border-radius: 12px;
        font-size: 17px;
        font-weight: 700;
        cursor: pointer;
        margin-top: 10px;
        transition: transform 0.2s active;
    }

    .yy-btn-submit:hover {
        background: #333;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .yy-alert-box {
        padding: 15px;
        background: #fff4d1;
        border-left: 5px solid #f8d05d;
        margin-bottom: 25px;
        border-radius: 8px;
        color: #856404;
    }
</style>

<div class="account-container">
    <h1 class="page-title">My Account</h1>

   <div class="account-wrapper">
        <aside class="sidebar">
            <ul class="categories">
                <li>
                    <a href="{{url_for('profile')}}">Personal Information</a>
                </li>
                <li>
                    <a href="{{url_for('myorders')}}">My Orders</a>
                </li>
                <li>
                    <a href="{{url_for('password_manager')}}">Password Manager</a>
                </li>
                <li>
                    <a href="{{url_for('home')}}">Log Out</a>
                </li>
            </ul>
        </aside>



    <div class="yy-main-editor">
        <h3 class="yy-section-title">Cài đặt tài khoản</h3>

        {% if message %}
            <div class="yy-alert-box">{{ message }}</div>
        {% endif %}

        <form action="/password_manager" method="POST">
            <div class="yy-input-group">
                <label class="yy-label-text">Tên đăng nhập mới</label>
                <input type="text" name="new_username" class="yy-form-field" value="{{ user['user_name'] }}" required>
            </div>

            <div style="height: 1px; background: #eee; margin: 40px 0;"></div>

            <h4 style="margin-bottom: 20px;">Đổi mật khẩu</h4>

            <div class="yy-input-group">
                <label class="yy-label-text">Mật khẩu hiện tại</label>
                <input type="password" name="current_password" class="yy-form-field" placeholder="Nhập mật khẩu cũ" required>
            </div>

            <div class="yy-input-group">
                <label class="yy-label-text">Mật khẩu mới</label>
                <input type="password" name="new_password" class="yy-form-field" placeholder="Mật khẩu tối thiểu 6 ký tự" required>
            </div>

            <div class="yy-input-group">
                <label class="yy-label-text">Xác nhận mật khẩu</label>
                <input type="password" name="confirm_password" class="yy-form-field" placeholder="Nhập lại mật khẩu mới" required>
            </div>

            <button type="submit" class="yy-btn-submit">Cập nhật thay đổi</button>
        </form>
    </div>
</div>
</div>
{% endblock %}
