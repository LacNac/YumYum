<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Quản lý Nhà hàng{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{url_for('static', filename = 'base.css')}}">
    {% block extra_style %}{% endblock %}
</head>
<body>
<nav>
    <a href="{{ url_for('manager.doanhthu') }}" class="nav-brand">Yummy</a>
    <a href="{{ url_for('manager.doanhthu') }}" {% if request.endpoint == 'manager.doanhthu' %}class="active"{% endif %}>Doanh Thu</a>
    <a href="{{ url_for('manager.deli') }}" {% if request.endpoint in ['manager.deli','manager.deli_chitiet'] %}class="active"{% endif %}>Giao Hàng</a>
    <a href="{{ url_for('manager.eatin') }}" {% if request.endpoint in ['manager.eatin','manager.eatin_chitiet'] %}class="active"{% endif %}>Tại Chỗ</a>
    <a href="{{url_for('login')}}" >Log Out</a>
</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

{% block extra_script %}{% endblock %}
</body>
</html>
