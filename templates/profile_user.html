{% extends "base.html" %}
{% block content %}
<div class="account-container">
    <h1 class="page-title">My Account</h1>


    <div class="account-wrapper">
        <aside class="sidebar">
            <ul class="categories">
                <li>
                    <a href="{{url_for('profile')}}">Personal Information</a>
                </li>
                <li>
                    <a href="{{url_for('myorders')}}">My Orders</a>
                </li>
                <li>
                    <a href="{{url_for('payment')}}">Payment Method</a>
                </li>
                <li>
                    <a href="{{url_for('password_manager')}}">Password Manager</a>
                </li>
                <li>
                    <a href="{{url_for('home')}}">Log Out</a>
                </li>
            </ul>
        </aside>
        <main class="account-content">
            <div class="profile-header">
                <div class="avatar-wrapper">
                    <img src="{{ url_for('static', filename='images/' + user['avatar']) }}" alt="Avatar">
                    <button class="edit-avatar-btn"><i class="fas fa-camera"></i></button>
                </div>
            </div>

            <form class="profile-form" method="POST">
                <h3 class="form-section-title">Personal Information</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Họ Tên *</label>
                        <input type="text" value="{{ user['Ten_kh'] }}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" value="{{ user['email'] }}">
                </div>

                <div class="form-group">
                    <label>Phone *</label>
                    <input type="text" value="{{ user['Sdt'] }}">
                </div>

                <div class="form-group">
                    <label>Gender *</label>
<select name="gioitinh">
    <option value="Nam" {{ "selected" if user["Gioi_tinh"] == "Nam" else "" }}>Male</option>
    <option value="Nữ" {{ "selected" if user["Gioi_tinh"] == "Nữ" else "" }}>Female</option>
    <option value="LGBT" {{ "selected" if user["Gioi_tinh"] == "LGBT" else "" }}>LGBT</option>
</select>
                </div>

                <hr class="form-divider">

                <h3 class="form-section-title">Delivery Address</h3>
                <div class="form-group">
                    <label>Street Address *</label>
                    <input type="text" placeholder="Số nhà, tên đường...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>City / Province *</label>
                        <input type="text" value="{{ user['Dia_chi'] }}">
                    </div>
                    <div class="form-group">
                        <label>District *</label>
                        <input type="text" placeholder="Quận / Huyện">
                    </div>
                </div>

                <div class="form-group">
                    <label>Note for Courier</label>
                    <textarea placeholder="Ghi chú cho shipper (ví dụ: Gọi trước khi giao, cổng sau...)"></textarea>
                </div>

                <button type="submit" class="btn-update">Update All Changes</button>
            </form>
        </main>
    </div>
</div>
{% endblock %}
