{% extends "base.html" %}
{% block content %}
<div class="account-container">
    <h1 class="page-title">Tài khoản của tôi</h1>


    <div class="account-wrapper">
        <aside class="sidebar">
            <ul class="categories_about">
                <li>
                    <a href="{{ url_for('profile') }}"
                       class="nav-account {% if request.endpoint == 'profile' %}active{% endif %}">
                        Thông tin cá nhân
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('myorders') }}"
                       class="nav-account {% if request.endpoint == 'myorders' %}active{% endif %}">
                        Đơn hàng của tôi
                    </a></li>
                <li>
                    <a href="{{ url_for('password_manager') }}"
                       class="nav-account {% if request.endpoint == 'password_manager' %}active{% endif %}">
                        Đổi mật khẩu
                    </a></li>
                <li>
                    <a href="{{url_for('logout')}}" class="nav-account">Log Out</a>
                </li>
            </ul>
        </aside>
        <main class="account-content">
            <div class="profile-header">
                <div class="avatar-wrapper">
                    <img src="{{ url_for('static', filename='images/' + user['avatar']) }}" alt="Avatar">
                    <button class="edit-avatar-btn"><i class="fas fa-camera"></i></button>
                </div>
            </div>

            <form class="profile-form" method="POST">
                <h3 class="form-section-title">Thông tin cá nhân</h3>
                <div class="form-row">
                    <div class="form-group">
                        <label>Họ Tên *</label>
                        <input type="text" value="{{ user['Ten_kh'] }}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" value="{{ user['email'] }}">
                </div>

                <div class="form-group">
                    <label>Số điện thoại *</label>
                    <input type="text" value="{{ user['Sdt'] }}">
                </div>

                <div class="form-group">
                    <label>Giới tính *</label>
                    <select name="gioitinh">
                        <option value="Nam" {{
                        "selected" if user["Gioi_tinh"] == "Nam" else "" }}>Nam</option>
                        <option value="Nữ" {{
                        "selected" if user["Gioi_tinh"] == "Nữ" else "" }}>Nữ</option>
                        <option value="LGBT" {{
                        "selected" if user["Gioi_tinh"] == "LGBT" else "" }}>LGBT</option>
                    </select>
                </div>

                <hr class="form-divider">

                <h3 class="form-section-title">Địa chỉ:</h3>
                <div class="form-group">
                    <label>Địa chỉ chi tiết *</label>
                    <input type="text" placeholder="Số nhà, tên đường...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Thành phố/ Tỉnh *</label>
                        <input type="text" value="{{ user['Dia_chi'] }}">
                    </div>
                    <div class="form-group">
                        <label>Quận/ Huyện *</label>
                        <input type="text" placeholder="Quận / Huyện">
                    </div>
                </div>

                <div class="form-group">
                    <label>Ghi chú</label>
                    <textarea placeholder="Ghi chú cho shipper (ví dụ: Gọi trước khi giao, cổng sau...)"></textarea>
                </div>

                <button type="submit" class="btn-update">Cập nhật thay đổi</button>
            </form>
        </main>
    </div>
</div>
{% endblock %}
